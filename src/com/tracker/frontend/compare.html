<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Compare Athletes — Sports Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E83A2F;--rd:#B52D24;--black:#0A0A0A;--card:#161616;--border:#2a2a2a;--text:#F0EDE8;--muted:#666;--accent:#F5C518;--green:#4ade80}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(10,10,10,.95)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.nav-logo span{width:32px;height:32px;background:var(--red);border-radius:8px;display:grid;place-items:center;font-size:16px}
.nav-links{display:flex;gap:16px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
main{max-width:1000px;margin:0 auto;padding:40px 24px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.input-row{display:grid;grid-template-columns:1fr 1fr auto;gap:16px;margin-bottom:32px;align-items:end}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--red)}
.field input::placeholder{color:#3a3a3a}
.btn-compare{background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-compare:hover{background:var(--rd)}
.btn-compare:disabled{opacity:.6;cursor:not-allowed}
.err-box{background:rgba(232,58,47,.1);border:1px solid rgba(232,58,47,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}
.err-box.show{display:block}
.banner{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:20px 24px;margin-bottom:24px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);text-align:center;display:none}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;display:none}
.athlete-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.athlete-card.winner{border-color:var(--accent)}
.athlete-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e1e1e;font-size:14px}
.stat-row:last-child{border-bottom:none}
.stat-l{color:var(--muted)}
.level-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.level-Excellent{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.level-Good{background:rgba(245,197,24,.15);color:var(--accent);border:1px solid rgba(245,197,24,.3)}
.level-Average{background:rgba(232,58,47,.15);color:#fca5a5;border:1px solid rgba(232,58,47,.3)}
.level-Needs{background:rgba(150,150,150,.1);color:var(--muted);border:1px solid var(--border)}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;display:none}
.chart-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:16px}
@media(max-width:700px){.input-row,.result-grid{grid-template-columns:1fr}nav{padding:14px 20px}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><span>🏃</span> APEX SPORTS</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="compare.html" class="active">Compare</a>
    <a href="login.html" onclick="sessionStorage.clear()">Logout</a>
  </div>
</nav>

<main>
  <div class="page-title">ATHLETE COMPARISON</div>
  <p class="page-sub">Enter two athlete email addresses to compare their performance from the database.</p>

  <div class="err-box" id="errBox"></div>

  <div class="input-row">
    <div class="field"><label>Athlete A (email)</label><input type="text" id="athleteA" placeholder="coach@example.com"></div>
    <div class="field"><label>Athlete B (email)</label><input type="text" id="athleteB" placeholder="athlete2@example.com"></div>
    <button class="btn-compare" onclick="compare()" id="cmpBtn">COMPARE</button>
  </div>

  <div class="banner" id="banner"></div>

  <div class="result-grid" id="resultGrid">
    <div class="athlete-card" id="cardA">
      <div class="athlete-name" id="nameA">—</div>
      <div class="stat-row"><span class="stat-l">Avg Score</span><span id="avgA">—</span></div>
      <div class="stat-row"><span class="stat-l">Level</span><span id="levelA">—</span></div>
      <div class="stat-row"><span class="stat-l">Trend</span><span id="trendA">—</span></div>
      <div class="stat-row"><span class="stat-l">Sessions</span><span id="sessA">—</span></div>
    </div>
    <div class="athlete-card" id="cardB">
      <div class="athlete-name" id="nameB">—</div>
      <div class="stat-row"><span class="stat-l">Avg Score</span><span id="avgB">—</span></div>
      <div class="stat-row"><span class="stat-l">Level</span><span id="levelB">—</span></div>
      <div class="stat-row"><span class="stat-l">Trend</span><span id="trendB">—</span></div>
      <div class="stat-row"><span class="stat-l">Sessions</span><span id="sessB">—</span></div>
    </div>
  </div>

  <div class="chart-card" id="chartCard">
    <div class="chart-title">SCORE COMPARISON</div>
    <canvas id="cmpChart"></canvas>
  </div>
</main>

<script>
const BASE = "http://localhost:8080";
let cmpChart;

function showErr(m){var e=document.getElementById("errBox");e.textContent=m;e.classList.add("show")}
function hideErr(){document.getElementById("errBox").classList.remove("show")}

function getLevel(s){return s>=85?"Excellent":s>=70?"Good":s>=50?"Average":"Needs Improvement"}
function getLevelClass(l){return l==="Excellent"?"level-Excellent":l==="Good"?"level-Good":l==="Average"?"level-Average":"level-Needs"}

function detectTrend(scores){
  var n=scores.length; if(n<2) return "Stable";
  var sx=0,sy=0,sxy=0,sx2=0;
  for(var i=0;i<n;i++){sx+=i;sy+=scores[i];sxy+=i*scores[i];sx2+=i*i}
  var d=(n*sx2)-(sx*sx); if(d===0) return "Stable";
  var slope=((n*sxy)-(sx*sy))/d;
  return slope>0.5?"Improving":slope<-0.5?"Declining":"Stable";
}

function compare(){
  var nA=document.getElementById("athleteA").value.trim();
  var nB=document.getElementById("athleteB").value.trim();
  var btn=document.getElementById("cmpBtn");
  hideErr();
  if(!nA||!nB){showErr("Please enter both athlete emails.");return}
  if(nA===nB){showErr("Please enter two different athletes.");return}
  btn.textContent="COMPARING..."; btn.disabled=true;

  // GET /records → filter by athlete → compute stats locally
  fetch(BASE+"/records")
  .then(r=>r.json())
  .then(all=>{
    var recA=all.filter(r=>r.athlete===nA);
    var recB=all.filter(r=>r.athlete===nB);

    if(!recA.length&&!recB.length){showErr("No records found for either athlete.");btn.textContent="COMPARE";btn.disabled=false;return}

    var avgA=recA.length?recA.reduce((s,r)=>s+r.score,0)/recA.length:0;
    var avgB=recB.length?recB.reduce((s,r)=>s+r.score,0)/recB.length:0;
    var lvlA=getLevel(avgA), lvlB=getLevel(avgB);
    var trA=detectTrend(recA.map(r=>r.score)), trB=detectTrend(recB.map(r=>r.score));

    // Fill cards
    document.getElementById("nameA").textContent=nA;
    document.getElementById("avgA").textContent=avgA.toFixed(2);
    document.getElementById("levelA").innerHTML='<span class="level-badge '+getLevelClass(lvlA)+'">'+lvlA+'</span>';
    document.getElementById("trendA").textContent=trA;
    document.getElementById("sessA").textContent=recA.length;

    document.getElementById("nameB").textContent=nB;
    document.getElementById("avgB").textContent=avgB.toFixed(2);
    document.getElementById("levelB").innerHTML='<span class="level-badge '+getLevelClass(lvlB)+'">'+lvlB+'</span>';
    document.getElementById("trendB").textContent=trB;
    document.getElementById("sessB").textContent=recB.length;

    // Winner highlight
    document.getElementById("cardA").classList.remove("winner");
    document.getElementById("cardB").classList.remove("winner");
    var winTxt;
    if(avgA>avgB){winTxt=nA.split("@")[0].toUpperCase()+" IS PERFORMING BETTER";document.getElementById("cardA").classList.add("winner")}
    else if(avgB>avgA){winTxt=nB.split("@")[0].toUpperCase()+" IS PERFORMING BETTER";document.getElementById("cardB").classList.add("winner")}
    else winTxt="BOTH ATHLETES ARE EQUAL";

    var banner=document.getElementById("banner");
    banner.textContent=winTxt; banner.style.display="block";
    document.getElementById("resultGrid").style.display="grid";
    document.getElementById("chartCard").style.display="block";

    // Bar chart
    if(cmpChart) cmpChart.destroy();
    cmpChart=new Chart(document.getElementById("cmpChart"),{
      type:"bar",
      data:{
        labels:["Avg Score","Sessions"],
        datasets:[
          {label:nA,data:[+avgA.toFixed(2),recA.length],backgroundColor:"#E83A2F"},
          {label:nB,data:[+avgB.toFixed(2),recB.length],backgroundColor:"#F5C518"}
        ]
      },
      options:{
        responsive:true,
        plugins:{legend:{labels:{color:"#666"}}},
        scales:{
          x:{ticks:{color:"#666"},grid:{color:"#1e1e1e"}},
          y:{ticks:{color:"#666"},grid:{color:"#1e1e1e"},beginAtZero:true}
        }
      }
    });
    btn.textContent="COMPARE"; btn.disabled=false;
  })
  .catch(()=>{showErr("Server not reachable. Make sure the Java server is running.");btn.textContent="COMPARE";btn.disabled=false});
}

document.addEventListener("keydown",e=>{if(e.key==="Enter")compare()});
</script>
</body>
</html>
