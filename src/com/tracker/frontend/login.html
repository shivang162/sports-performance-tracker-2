<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sports Tracker — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E83A2F;--rd:#B52D24;--black:#0A0A0A;--card:#161616;--border:#2a2a2a;--text:#F0EDE8;--muted:#666;--accent:#F5C518}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,58,47,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,58,47,.04) 1px,transparent 1px);background-size:60px 60px;animation:grid 20s linear infinite;pointer-events:none}
@keyframes grid{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
body::after{content:'';position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(232,58,47,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15);opacity:.7}}
.wrapper{position:relative;z-index:10;display:grid;grid-template-columns:1fr 1px 420px;max-width:860px;width:90%;animation:up .8s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.brand{padding:60px 50px 60px 0;display:flex;flex-direction:column;justify-content:space-between}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.logo-icon{width:40px;height:40px;background:var(--red);border-radius:10px;display:grid;place-items:center;font-size:20px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.headline{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,6vw,76px);line-height:.95;letter-spacing:2px;margin-bottom:24px}
.headline span{color:var(--red);display:block}
.sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px;margin-bottom:48px}
.stats{display:flex;gap:32px}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);letter-spacing:1px}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.vdiv{background:var(--border);width:1px}
.form{padding:60px 0 60px 50px}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:6px}
.form-sub{font-size:13px;color:var(--muted);margin-bottom:40px}
.field{margin-bottom:20px;position:relative}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;transition:color .2s}
.field:focus-within label{color:var(--red)}
.field input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.field input::placeholder{color:#3a3a3a}
.field input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(232,58,47,.12)}
.field-icon{position:absolute;right:14px;bottom:14px;font-size:16px;pointer-events:none;opacity:.3}
.row{display:flex;align-items:center;justify-content:space-between;margin:-6px 0 28px}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.remember input[type=checkbox]{appearance:none;width:16px;height:16px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s,border-color .2s}
.remember input:checked{background:var(--red);border-color:var(--red)}
.remember input:checked::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:700}
.forgot{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
.forgot:hover{color:var(--red)}
.btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:15px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;position:relative;overflow:hidden;transition:background .2s,transform .1s}
.btn:hover{background:var(--rd)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.7;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-guest{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:13px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:border-color .2s,color .2s}
.btn-guest:hover{border-color:var(--text);color:var(--text)}
.register-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
.register-link:hover{color:var(--text)}
.msg{border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.msg.show{display:block}
.err{background:rgba(232,58,47,.1);border:1px solid rgba(232,58,47,.3);color:#f87171;animation:shake .3s ease}
.suc{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@media(max-width:680px){.wrapper{grid-template-columns:1fr;max-width:420px}.brand,.vdiv{display:none}.form{padding:50px 0}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div>
      <div class="logo-row"><div class="logo-icon">🏃</div><div class="logo-text">APEX SPORTS</div></div>
      <div class="headline">TRACK.<br>ANALYZE.<br><span>DOMINATE.</span></div>
      <p class="sub">Your all-in-one performance hub. Log sessions, visualize progress, and push past your limits every day.</p>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-n">12K+</span><span class="stat-l">Athletes</span></div>
      <div class="stat"><span class="stat-n">98M</span><span class="stat-l">Sessions</span></div>
      <div class="stat"><span class="stat-n">4.9★</span><span class="stat-l">Rating</span></div>
    </div>
  </div>
  <div class="vdiv"></div>
  <div class="form">
    <div class="form-title">WELCOME BACK</div>
    <p class="form-sub">Sign in to continue your journey</p>
    <div class="msg err" id="errMsg"></div>
    <div class="msg suc" id="sucMsg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="username" placeholder="coach@example.com" autocomplete="username">
      <span class="field-icon">👤</span>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <span class="field-icon">🔒</span>
    </div>
    <div class="row">
      <label class="remember"><input type="checkbox" id="remember"> Keep me signed in</label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button class="btn" onclick="login()" id="loginBtn">LOGIN</button>
    <div class="divider">or</div>
    <button class="btn-guest" onclick="guestLogin()">Continue as Guest</button>
    <a href="register.html" class="register-link">Don't have an account? Register</a>
  </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
