<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register — Sports Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E83A2F;--rd:#B52D24;--black:#0A0A0A;--card:#161616;--border:#2a2a2a;--text:#F0EDE8;--muted:#666;--accent:#F5C518}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,58,47,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,58,47,.04) 1px,transparent 1px);background-size:60px 60px;animation:grid 20s linear infinite;pointer-events:none}
@keyframes grid{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
.wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:0 20px;animation:up .6s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-icon{width:36px;height:36px;background:var(--red);border-radius:8px;display:grid;place-items:center;font-size:18px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.field{margin-bottom:18px;position:relative}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;transition:color .2s}
.field:focus-within label{color:var(--red)}
.field input,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.field input::placeholder{color:#3a3a3a}
.field input:focus,.field select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(232,58,47,.12)}
.field select option{background:var(--card);color:var(--text)}
.btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;cursor:pointer;transition:background .2s,transform .1s;margin-top:4px}
.btn:hover{background:var(--rd)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.7;cursor:not-allowed}
.back{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
.back:hover{color:var(--text)}
.msg{border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.msg.show{display:block}
.err{background:rgba(232,58,47,.1);border:1px solid rgba(232,58,47,.3);color:#f87171;animation:shake .3s ease}
.suc{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row"><div class="logo-icon">🏃</div><div class="logo-text">APEX SPORTS</div></div>
  <div class="title">CREATE ACCOUNT</div>
  <p class="sub">Join and start tracking your performance</p>
  <div class="msg err" id="errMsg"></div>
  <div class="msg suc" id="sucMsg"></div>
  <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"></div>
  <div class="field"><label>Password (min 6 chars)</label><input type="password" id="regPass" placeholder="••••••••"></div>
  <div class="field"><label>Confirm Password</label><input type="password" id="regConfirm" placeholder="••••••••"></div>
  <div class="field">
    <label>Role</label>
    <select id="regRole"><option value="athlete">Athlete</option><option value="coach">Coach</option></select>
  </div>
  <button class="btn" onclick="register()" id="regBtn">REGISTER</button>
  <a href="login.html" class="back">Already have an account? Login</a>
</div>
<script>
const BASE = "http://localhost:8080";
function showErr(m){var e=document.getElementById("errMsg");e.textContent=m;e.classList.add("show");document.getElementById("sucMsg").classList.remove("show")}
function showSuc(m){var e=document.getElementById("sucMsg");e.textContent=m;e.classList.add("show");document.getElementById("errMsg").classList.remove("show")}
function register(){
  var email=document.getElementById("regEmail").value.trim();
  var pass=document.getElementById("regPass").value;
  var conf=document.getElementById("regConfirm").value;
  var role=document.getElementById("regRole").value;
  var btn=document.getElementById("regBtn");
  document.getElementById("errMsg").classList.remove("show");
  document.getElementById("sucMsg").classList.remove("show");
  if(!email||!pass||!conf){showErr("All fields are required.");return}
  if(!email.includes("@")){showErr("Enter a valid email.");return}
  if(pass.length<6){showErr("Password must be at least 6 characters.");return}
  if(pass!==conf){showErr("Passwords do not match.");return}
  btn.textContent="REGISTERING...";btn.disabled=true;
  fetch(BASE+"/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pass,role})})
  .then(r=>r.json()).then(d=>{
    if(d.success){showSuc("Account created! Redirecting to login...");setTimeout(()=>{window.location.href="login.html"},1500)}
    else{showErr(d.error||"Registration failed.");btn.textContent="REGISTER";btn.disabled=false}
  }).catch(()=>{showErr("Server not reachable. Is the Java server running?");btn.textContent="REGISTER";btn.disabled=false});
}
document.addEventListener("keydown",e=>{if(e.key==="Enter")register()});
</script>
</body>
</html>
